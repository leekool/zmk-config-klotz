# suppress connection status blinks on peripheral
CONFIG_RGBLED_WIDGET_CONN_COLOR_CONNECTED=0
CONFIG_RGBLED_WIDGET_CONN_COLOR_ADVERTISING=0
CONFIG_RGBLED_WIDGET_CONN_COLOR_DISCONNECTED=0

# show middle LED persistently as power indicator
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y
CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=2
